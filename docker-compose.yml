name: n8n-stack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    image: n8n-nurassyl:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_PORT: ${N8N_PORT}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
      N8N_RUNNERS_ENABLED: ${N8N_RUNNERS_ENABLED}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL}
      NODE_ENV: ${NODE_ENV}

      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${TZ}

      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}

      # Enforce secure cookies because we're behind HTTPS reverse proxy
      N8N_SECURE_COOKIE: "true"

      # rclone config lives inside the n8n_data volume so OAuth tokens
      # for OneDrive persist across container rebuilds.
      RCLONE_CONFIG: /home/node/.n8n/rclone.conf
    volumes:
      - n8n_data:/home/node/.n8n
      - ./files:/files
    networks: [internal]

  mcp-excel:
    build:
      context: ./mcp-excel
      dockerfile: Dockerfile
    image: mcp-excel:latest
    restart: unless-stopped
    volumes:
      - ./mcp-excel/data:/app/data
    environment:
      PORT: 3000
      TOKENS_PATH: /app/data/tokens.json
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
      - mcp-excel
    networks: [internal]

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
